name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Keeps the dependency tree at zero known vulnerabilities. `npm audit`
      # exits non-zero on any finding, so a new advisory fails CI rather than
      # sitting unnoticed in a submission.
      - name: Audit dependencies
        run: npm audit --audit-level=low
